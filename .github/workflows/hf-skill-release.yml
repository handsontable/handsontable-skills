name: HF Skill Release

# Releases the hyperformula skill independently of handsontable.
# Tag format:
#   hyperformula/v<X.Y.Z>   — HyperFormula product version this skill targets
#
# Skill-only fixes (typos, broken links, no product change) can re-tag the
# same product version with a +skill.<n> suffix, e.g. hyperformula/v3.3.0+skill.1.

on:
  push:
    tags:
      - 'hyperformula/v*'

permissions:
  contents: write
  id-token: write # required for npm publish --provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse tag
        id: tag
        run: |
          # GITHUB_REF_NAME is e.g. "hyperformula/v3.3.0"
          VERSION="${GITHUB_REF_NAME##*/}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build skill archive and RAG doc
        run: ./scripts/build.sh --skip-links

      - name: Attach release asset
        uses: softprops/action-gh-release@v2
        with:
          name: hyperformula ${{ steps.tag.outputs.version }}
          files: |
            dist/hyperformula.zip
            dist/hyperformula-rag.md
          generate_release_notes: true

      - name: Set up Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Publish skill to npm
        working-directory: skills/hyperformula
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Tag version is e.g. "v3.3.0" or, for a skill-only re-tag,
          # "v3.3.0+skill.1". Derive the npm version from it.
          VER="${{ steps.tag.outputs.version }}"
          VER="${VER#v}"
          NPM_TAG="latest"

          # npm strips semver build metadata ("3.3.0+skill.1" -> "3.3.0"), which
          # would collide with the already-published base version. Publish
          # skill-only fixes as a prerelease under a separate dist-tag instead,
          # so they never overwrite the product-version release on `latest`.
          if [[ "$VER" == *"+skill."* ]]; then
            VER="${VER/+skill./-skill.}"
            NPM_TAG="skill-fix"
          fi

          npm version "$VER" --no-git-tag-version --allow-same-version
          npm publish --access public --provenance --tag "$NPM_TAG"
