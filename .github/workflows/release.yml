name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build skill archives and RAG docs
        run: ./scripts/build.sh --skip-links

      - name: Attach archives to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/handsontable.zip
            dist/hyperformula.zip
          generate_release_notes: true
